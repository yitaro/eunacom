<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma EUNACOM</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: flex; height: 100vh; }
        .sidebar { width: 280px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; font-size: 1.2rem; }
        .category { margin-bottom: 20px; }
        .category-title { font-weight: bold; color: #bdc3c7; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
        .quiz-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: #ecf0f1; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .quiz-btn:hover { background-color: #34495e; color: #3498db; }
        .quiz-btn.active { background-color: #3498db; color: white; font-weight: bold; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .app-container { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 750px; height: fit-content; }
        .welcome-screen { text-align: center; color: #34495e; margin-top: 100px; }
        .question-header { font-weight: bold; color: #7f8c8d; margin-bottom: 15px; font-size: 0.9rem; }
        .question-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 25px; color: #2c3e50; }
        .option { display: block; padding: 15px; margin: 10px 0; background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #eef2f5; border-color: #b0bec5; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .explanation { margin-top: 25px; padding: 20px; background: #e8f4f8; border-left: 5px solid #3498db; border-radius: 0 8px 8px 0; display: none; line-height: 1.6; font-size: 0.98rem; }
        .btn-next { background: #3498db; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 20px; display: none; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-next:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📋 Módulos EUNACOM</h2>
    <div class="category">
<div class="category-title">Respiratorio</div>
        <button class="quiz-btn" onclick="startQuiz('respiratorio_1', this)">📝 Cuestionario 1 (20 Q)</button>
        <!-- Pega el nuevo botón justo aquí debajo -->
        <button class="quiz-btn" onclick="startQuiz('respiratorio_2', this)">📝 Cuestionario 2 (20 Q)</button>
    </div>
</div>

<div class="main-content">
    <div id="app" class="app-container">
        <div class="welcome-screen">
            <h1>🩺 Banco de Casos Clínicos</h1>
            <p>Selecciona un cuestionario en el menú de la izquierda para comenzar a estudiar con tu amigo.</p>
        </div>
    </div>
</div>

<script>
    // BASE DE DATOS DE CUESTIONARIOS
    const bancoPreguntas = {
        respiratorio_1: [
            {
                q: "Paciente de 21 años presenta un cuadro de malestar general, fiebre y tos con expectoración mucopurulenta, con una evolución de 2 días. Al examen físico se encuentra FC: 70x’, PA: 120/80 mmHg, FR: 17x’ y en la auscultación pulmonar se aprecian crepitaciones en la mitad inferior del campo pulmonar derecho. Satura 93% a FiO2 ambiental y se solicita una radiografía de tórax AP-L que muestra condensación del lóbulo inferior derecho. ¿Cuál es el tratamiento antibiótico más indicado?",
                options: ["Amoxicilina", "Cefadroxilo", "Clindamicina", "Cloxacilina", "Amoxicilina clavulánico"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Amoxicilina</b><br><br><b>Amoxicilina (correcta):</b> Adecuada para tratar neumonía adquirida en la comunidad causada por Streptococcus pneumoniae. Actúa inhibiendo la síntesis de la pared celular bacteriana, siendo efectiva en pacientes ambulatorios con síntomas leves o moderados sin factores de riesgo."
            },
            {
                q: "Paciente de 30 años cursando cuadro agudo de fiebre y odinofagia severa. El examen físico revela eritema y edema faríngeo, petequias en el paladar blando, y aumento de volumen y eritema de ambas amígdalas palatinas, las cuales presentan exudado blanquecino-grisáceo adherido. El agente más probable es:",
                options: ["Influenza A", "Streptococcus pyogenes", "Citomegalovirus", "VRS", "Adenovirus"],
                answer: 1,
                explanation: "<b>Respuesta Correcta: Streptococcus pyogenes</b><br><br><b>Streptococcus pyogenes (correcta):</b> Se caracteriza por faringoamigdalitis exudativa aguda con odinofagia intensa, fiebre elevada y exudados adheridos a las amígdalas. Las petequias en paladar blando (signo de Forchheimer) son altamente sugestivas."
            },
            {
                q: "Hombre de 72 años, fumador de larga data con EPOC tratado con salbutamol. Refiere que su capacidad para realizar actividades diarias se ha reducido notablemente debido a disnea ante esfuerzos moderados. En el examen físico se detectan sibilancias en ambos campos pulmonares. ¿Qué cambio en el manejo corresponde?:",
                options: ["Agregar broncodilatador de acción larga horaria", "Continuar con salbutamol en mayor dosis y reevaluar", "Cambiar salbutamol por broncodilatador de acción larga", "Agregar corticoides a tratamiento actual", "Agregar broncodilatador de acción larga y corticoides a tratamiento actual"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Agregar broncodilatador de acción larga horaria</b><br><br><b>Explicación:</b> Según las guías GOLD, ante la persistencia de síntomas con un broncodilatador de acción corta, corresponde escalar el tratamiento agregando un fármaco de acción prolongada (LABA o LAMA)."
            },
            {
                q: "Indique cuál de los siguientes es compatible con una insuficiencia respiratoria parcial:",
                options: ["PaO2 40 y PaCO2 40", "PaO2 61 y PaCO2 40", "PaO2 63 y PaCO2 40", "PaO2 67 y PaCO2 40", "PaO2 71 y PaCO2 40"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: PaO2 40 y PaCO2 40</b><br><br><b>Explicación:</b> La insuficiencia respiratoria parcial (tipo I) se define por hipoxemia (PaO2 < 60 mmHg) con normocapnia o hipocapnia (PaCO2 normal o baja)."
            },
            {
                q: "Paciente de 67 años sin antecedentes mórbidos, quien ha trabajado por más de 30 años en una fábrica de materiales de construcción. Consulta por un cuadro de varios meses de duración caracterizado por disnea progresiva y pérdida de peso. Se realiza una radiografía de tórax que revela engrosamiento pleural bilateral, afectación de las cisuras pulmonares y un patrón reticular. El diagnóstico más probable es:",
                options: ["Mesotelioma", "Absceso pulmonar", "Tuberculosis", "Metástasis", "Cáncer hepático"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Mesotelioma</b><br><br><b>Explicación:</b> Neoplasia maligna de la pleura fuertemente vinculada con la exposición laboral crónica al asbesto (materiales de construcción)."
            },
            {
                q: "Hombre de 32 años, asmático con mal control quien usa solo salbutamol SOS. Es llevado al servicio de urgencia tras 4 días de un cuadro de incremento de disnea basal, tos con expectoración purulenta y fiebre hasta 39,5°C. En la evaluación física, se encuentra disneico, con FC 115lpm, PA 127/78mmHg, FR 32 por minuto y Sat 89% en FiO2 ambiental. ¿Cuál es la conducta a seguir?",
                options: ["Nebulización con ipatropio, administrar oxígeno, corticoides y levofloxacino", "Iniciar amoxicilina vía oral y control en consultorio al día siguiente", "Evaluar necesidad de kinesiología respiratoria", "Nebulización con ipatropio y administrar oxígeno", "Nebulización con ipatropio, administrar oxígeno y corticoides"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Nebulización con ipatropio, administrar oxígeno, corticoides y levofloxacino</b><br><br><b>Explicación:</b> El paciente presenta una crisis asmática severa y signos de neumonía. Requiere soporte de oxígeno, rescate broncodilatador intensivo, corticoides sistémicos y cobertura antibiótica de amplio espectro hospitalaria."
            },
            {
                q: "Mujer de 71 años, tabaquica activa IPA 35, acude por baja de peso progresiva en los últimos meses. Entre los exámenes solicitados, destaca una radiografía de tórax que muestra dos nódulos pulmonares radiopacos y redondos de bordes irregulares: el mayor de 4cm de diámetro en el lóbulo superior izquierdo y otro de 1cm de diámetro en el lóbulo inferior derecho. ¿Cuál es el diagnóstico más probable?",
                options: ["Metástasis", "Bronquiectasias", "Tuberculosis", "Absceso pulmonar", "Fibrosis pulmonar"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Metástasis</b><br><br><b>Explicación:</b> Nódulos múltiples bilaterales de bordes irregulares, asociados a un síndrome consuntivo en una paciente con alto índice tabáquico, orientan firmemente a diseminación secundaria (metástasis)."
            },
            {
                q: "Paciente de 40 años acude para revisión de espirometría realizada hace 3 días, que informa: VEF1/CVF: 74%, VEF1: 45%, CVF: 58% y NO hay mejoría con broncodilatador. Indique su conclusión respecto a la información entregada:",
                options: ["Patrón restrictivo", "Normal", "Patrón obstructivo leve", "Patrón obstructivo severo", "Indefinido"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Patrón restrictivo</b><br><br><b>Explicación:</b> Relación VEF1/CVF preservada (>70%) con caída proporcional de los volúmenes (VEF1 y CVF por debajo de 80%), característico de la restricción."
            },
            {
                q: "Joven de 24 años presenta los resultados de su espirometría que muestran: VEF1/CVF: 80%, VEF1: 100%, CVF: 96% y mejora con broncodilatador. El resultado de la espirometría es:",
                options: ["Normal", "Patrón restrictivo", "Patrón obstructivo leve", "Patrón obstructivo severo", "Indefinido"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Normal</b><br><br><b>Explicación:</b> Todos los parámetros basales están sobre el 80% (o 70% en el índice), por lo que la función pulmonar es normal."
            },
            {
                q: "Mujer de 37 años, consulta por un cuadro de 5 días de evolución caracterizado por odinofagia y tos sin expectoración, menciona que en las últimas 24 horas ha experimentado un aumento en el compromiso del estado general y presenta disnea de grandes esfuerzos. En el examen físico registra una temperatura de 38,7°C y durante el examen pulmonar se detectan crépitos y sibilancias bilaterales. La radiografía de tórax revela un patrón alveolo-intersticial con engrosamientos peribronquiales. El diagnóstico más probable es:",
                options: ["Neumonía atípica por Mycoplasma", "Bronquitis aguda", "Neumonía ATS I", "Insuficiencia cardiaca", "TEP"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Neumonía atípica por Mycoplasma</b><br><br><b>Explicación:</b> El cuadro respiratorio subagudo con disnea, sibilancias y una radiografía con un patrón intersticial/peribronquial difuso es la presentación clásica de una neumonía atípica."
            },
            {
                q: "Hombre de 28 años con antecedentes de tos con expectoración de algunos años de evolución, especialmente en las mañanas. Tiene antecedentes de infecciones respiratorias recurrentes. La radiografía de tórax muestra alteraciones sugerentes de bronquiectasias. ¿Cuál es el examen de elección para continuar el estudio de este paciente?",
                options: ["TAC de tórax", "Fibrobroncoscopia con lavado bronquioalveolar", "Baciloscopias seriadas", "Espirometría", "Biopsia pulmonar"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: TAC de tórax</b><br><br><b>Explicación:</b> La tomografía computarizada de alta resolución es el estándar de oro para confirmar, mapear y evaluar la gravedad de las bronquiectasias."
            },
            {
                q: "Mujer de 67 años, fumadora con IPA de 20, consulta por tos con expectoración mucosa ocasionalmente hemoptoica de 3 meses de evolución. Menciona pérdida de peso de aproximadamente 10 kg desde entonces. Se solicitan baciloscopias seriadas que resultan negativas, y una radiografía de tórax que muestra una masa. ¿Cuál es el diagnóstico más probable?",
                options: ["Cáncer pulmonar", "Tuberculosis pleural", "Insuficiencia cardiaca", "Aspergilloma", "Bronquiectasias"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Cáncer pulmonar</b><br><br><b>Explicación:</b> En un paciente mayor, fumador, con hemoptisis cronificada, baja de peso masiva y masa pulmonar visible, el diagnóstico primario a descartar es la neoplasia pulmonar."
            },
            {
                q: "Hombre con antecedente de VIH en TARV hace 1 año, acude por un cuadro de 4 semanas de fiebre, pérdida de peso y tos con expectoración mucopurulenta ocasionalmente hemoptoica. Se realizan baciloscopias de expectoración que resultan negativas, cultivo MGIT (+), y PPD mide 5 mm. ¿Cuál es la conducta más adecuada?",
                options: ["Iniciar tratamiento estándar para la tuberculosis", "Realizar biopsia pulmonar", "Indicar tratamiento antibiótico con amoxicilina/ácido clavulánico", "Realizar PCR para mycobacterium TBC y decidir conducta con resultado", "Iniciar profilaxis con isoniacida"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Iniciar tratamiento estándar para la tuberculosis</b><br><br><b>Explicación:</b> El cultivo positivo confirma la enfermedad activa, y en pacientes inmunocomprometidos por VIH, un viraje o diámetro de PPD ≥ 5 mm es patológico. Requiere tratamiento de inmediato."
            },
            {
                q: "Mujer de 41 años sin antecedentes consulta por un mes de expectoración mucopurulenta ocasionalmente hemoptoica, asociada a fiebre, sudoración nocturna y pérdida de peso. Tiene baciloscopias de expectoración que son negativas. ¿Cuál es el examen más adecuado para continuar el estudio?",
                options: ["PCR para Mycobacterium tuberculosis", "Biopsia pulmonar", "Espirometría", "Hemocultivos", "TAC de tórax de alta resolución"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: PCR para Mycobacterium tuberculosis</b><br><br><b>Explicación:</b> Ante alta sospecha clínica con baciloscopías negativas, las pruebas de amplificación molecular rápidas (PCR) ofrecen un diagnóstico certero en pocas horas."
            },
            {
                q: "Hombre de 59 años con antecedente de fibrilación auricular, en tratamiento con anticoagulantes orales y amiodarona, acude por disnea de esfuerzo progresiva y tos con expectoración desde hace algunos meses. Las baciloscopias son negativas y la radiografía de tórax muestra compromiso intersticial. ¿Cuál es la conducta más adecuada?",
                options: ["Suspender Amiodarona", "Iniciar oxigenoterapia domiciliaria", "Iniciar tratamiento antituberculoso", "Iniciar azitromicina vía oral", "Suspender anticoagulantes orales e iniciar aspirina"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Suspender Amiodarona</b><br><br><b>Explicación:</b> La amiodarona causa toxicidad pulmonar que puede evolucionar a fibrosis pulmonar grave. Su retiro inmediato es la primera línea de manejo."
            },
            {
                q: "Un paciente de 33 años consulta por un cuadro de 5 semanas de tos irritativa y expectoración progresiva, con disnea de medianos esfuerzos. Refiere baja de peso de 6 kg en los últimos 3 meses. Al examen físico se encuentra taquipneico e hipoxémico (Sat 92%). La radiografía muestra infiltrados intersticiales difusos en vidrio esmerilado perihiliares. ¿Cuál es el diagnóstico más probable?",
                options: ["Neumonía por Pneumocystis jiroveci", "Fibrosis pulmonar", "Asma bronquial", "Neumonitis viral", "Neumonía por Mycoplasma"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Neumonía por Pneumocystis jiroveci</b><br><br><b>Explicación:</b> El patrón en vidrio esmerilado bilateral con distribución perihiliar simétrica e hipoxemia marcada es patognomónico de la infección oportunista por P. jirovecii."
            },
            {
                q: "Mujer de 20 años presenta rinorrea, congestión nasal, disnea, tos y sibilancias que aparecen tras ejercicio y en primavera. Examen pulmonar intercrisis normal. PEF: 100% del esperado. ¿Cuál es el examen más adecuado para continuar el estudio en esta paciente?",
                options: ["Prueba de provocación bronquial", "Prick test", "TAC de tórax", "Espirometría basal y postbroncodilatador", "Prueba de eosinófilos nasales"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Prueba de provocación bronquial</b><br><br><b>Explicación:</b> Ante una fuerte sospecha clínica de asma pero con flujos basales completamente normales, el test de provocación química (metacolina) o con ejercicio es la herramienta para demostrar la hiperreactividad bronquial."
            },
            {
                q: "Adulto mayor de 76 años, con IMC: 32, presenta alteraciones de la memoria desde hace 2 años, asociado a desconcentración e hipersomnia. Indique el estudio de elección para iniciar el estudio:",
                options: ["Polisomnografía", "Electrocardiograma", "Ecocardiograma", "RMN de cerebro", "TAC de cerebro"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Polisomnografía</b><br><br><b>Explicación:</b> La hipersomnia asociada a obesidad en un adulto mayor con declive cognitivo obliga a descartar el Síndrome de Apnea Obstructiva del Sueño (SAHOS) mediante el registro polisomnográfico."
            },
            {
                q: "Mujer de 23 años presenta tos frecuente y disnea, asociada a sibilancias que empeoran en la noche y con el ejercicio. Al examen físico presenta espiración prolongada con sibilancias bilaterales. ¿Cuál es el tratamiento de mantención más adecuado?",
                options: ["Budesonida inhalada + salmeterol cada 12 horas", "Evitar la exposición a desencadenantes", "Salbutamol inhalado cada 6 horas", "Salmeterol inhalado cada 12 horas", "Desensibilizar para los alérgenos"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: Budesonida inhalada + salmeterol cada 12 horas</b><br><br><b>Explicación:</b> El asma persistente requiere terapia combinada fija de un corticoide inhalado para desinflamar la vía aérea junto a un LABA para mantener la broncodilatación."
            },
            {
                q: "Un hombre de 68 años presenta una fractura de cadera, de la cual es intervenido quirúrgicamente. Al segundo día, experimenta un síncope agudo. Se encuentra taquicárdico, hipotenso e hipoxémico (Sat 91%). El examen pulmonar es normal. ¿Qué examen es el más apropiado para continuar con el estudio?",
                options: ["AngioTAC de tórax", "Ecocardiograma", "Radiografía de tórax", "TILT test", "Monitorización electrocardiográfica de 24 horas"],
                answer: 0,
                explanation: "<b>Respuesta Correcta: AngioTAC de tórax</b><br><br><b>Explicación:</b> Un síncope súbito con compromiso respiratorio e hemodinámico en el postoperatorio inmediato de una cirugía ortopédica mayor es altamente sugerente de un Tromboembolismo Pulmonar (TEP)."
            }
        ]
    };

    let activeQuiz = [];
    let currentQ = 0;

    function startQuiz(quizKey, element) {
        // Cambiar estados visuales de los botones del menú
        const buttons = document.querySelectorAll('.quiz-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        activeQuiz = bancoPreguntas[quizKey];
        currentQ = 0;
        loadQuestion();
    }

    function loadQuestion() {
        const app = document.getElementById('app');
        const qData = activeQuiz[currentQ];
        
        let html = `
            <div class="question-header">Pregunta ${currentQ + 1} de ${activeQuiz.length}</div>
            <div class="question-text">${qData.q}</div>
            <div id="options-container">
        `;
        
        qData.options.forEach((opt, index) => {
            html += `<div class="option" onclick="checkAnswer(${index}, this)">${opt}</div>`;
        });
        
        html += `
            </div>
            <div id="exp-container" class="explanation">${qData.explanation}</div>
            <button id="next-btn" class="btn-next" onclick="nextQuestion()">Siguiente Pregunta ➔</button>
        `;
        
        app.innerHTML = html;
    }

    function checkAnswer(selectedIndex, element) {
        const qData = activeQuiz[currentQ];
        const allOptions = document.getElementById('options-container').children;
        const expContainer = document.getElementById('exp-container');
        const nextBtn = document.getElementById('next-btn');

        for(let i = 0; i < allOptions.length; i++) {
            allOptions[i].style.pointerEvents = 'none';
            if (i === qData.answer) allOptions[i].classList.add('correct');
        }

        if (selectedIndex !== qData.answer) element.classList.add('incorrect');

        expContainer.style.drop = 'block';
        expContainer.style.display = 'block';
        nextBtn.style.display = 'block';

        if(currentQ === activeQuiz.length - 1) {
            nextBtn.innerText = "Finalizar Cuestionario";
            nextBtn.onclick = () => {
                document.getElementById('app').innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <h2 style="color: #28a745;">¡Cuestionario Completado!</h2>
                        <p>Has revisado las 20 preguntas de este módulo con tu amigo.</p>
                        <p>Selecciona otro cuestionario en el menú lateral para continuar.</p>
                    </div>`;
            };
        }
    }

    function nextQuestion() {
        currentQ++;
        loadQuestion();
    }
</script>

</body>
</html>
